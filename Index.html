function log(msg) {
  const dbg = document.getElementById('debug');
  dbg.innerHTML += '<br>' + new Date().toLocaleTimeString() + ' - ' + msg;

}

// Define timeout
let firebaseLoaded = false;
setTimeout(() => {
  if (!firebaseLoaded) {
    log('❌ TIMEOUT! Firebase não carregou em 10 segundos.');
    document.getElementById('statusConexao').textContent = '🔴 Firebase BLOQUEADO! Tente outro navegador (Chrome/Firefox)';
    document.getElementById('statusConexao').className = 'status offline';
  }
}, 10000);

// Carrega Firebase via script
function carregarScript(url, callback) {
  log('Carregando: ' + url);
  const s = document.createElement('script');
  s.src = url;
  s.onload = () => { log('✅ Carregado: ' + url.split('/').pop()); callback(); };
  s.onerror = () => {
    log('❌ ERRO ao carregar: ' + url);
    document.getElementById('statusConexao').textContent = '🔴 Bloqueado pelo navegador! Use Chrome/Firefox.';
    document.getElementById('statusConexao').className = 'status offline';
  };
  document.head.appendChild(s);
}

function iniciarApp() {
  log('Inicializando Firebase...');
  try {
    const firebaseConfig = {
      apiKey: "AIzaSyDzcKLA1vaCc2PRIpJwuAHpGq3K2ZGb9ns",
      authDomain: "copa-efootball.firebaseapp.com",
      databaseURL: "https://copa-efootball-default-rtdb.firebaseio.com",
      projectId: "copa-efootball",
      storageBucket: "copa-efootball.firebasestorage.app",
      messagingSenderId: "157666809695",
      appId: "1:157666809695:web:b120d94e41d3d2713a48ea"
    };
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    inscricoesRef = db.ref('inscricoes');
    log('✅ Firebase iniciado! Conectando ao banco...');

    inscricoesRef.on('value', (snapshot) => {
      inscricoesCache = snapshot.val() || {};
      const qtd = Object.keys(inscricoesCache).length;
      log('✅ Conectado! ' + qtd + ' inscrições no banco.');
      statusConexao.textContent = '🟢 Conectado (' + qtd + ' inscrições)';
      statusConexao.className = 'status online';
      // Esconde debug após sucesso
      setTimeout(() => { document.getElementById('debug').style.display = 'none'; }, 3000);
      if (ligaSel.value) atualizarClubes();
      if (adminPanel.classList.contains('show')) mostrarInscricoes();
    }, (error) => {
      log('❌ Erro de conexão: ' + error.message);
      statusConexao.textContent = '🔴 Erro: ' + error.message;
      statusConexao.className = 'status offline';
    });
  } catch (e) {
    log('❌ Erro ao iniciar: ' + e.message);
    statusConexao.textContent = '🔴 Erro: ' + e.message;
    statusConexao.className = 'status offline';
  }
}

function getInscricoesArray() {
  return Object.entries(inscricoesCache).map(([id, dados]) => ({ id, ...dados }));
}
function contarInscricoes(clube) {
  return getInscricoesArray().filter(i => i.clube === clube).length;
}
function clubeCheio(clube) {
  return contarInscricoes(clube) >= LIMITE_POR_CLUBE;
}
function validarFormulario() {
  const nomeOk = nomeInput.value.trim().length >= 2;
  const ligaOk = ligaSel.value !== '';
  const clubeOk = clubeSel.value !== '';
  const naoEstaCheio = clubeOk && !clubeCheio(clubeSel.value);
  btnWpp.disabled = !(nomeOk && ligaOk && clubeOk && naoEstaCheio);
}
function atualizarClubes() {
  const valor = ligaSel.value;
  const clubeAtual = clubeSel.value;
  clubeSel.innerHTML = '';
  if (!valor) {
    clubeSel.disabled = true;
    clubeSel.innerHTML = '<option value="">-- Selecione primeiro uma liga --</option>';
    vagasInfo.classList.remove('show');
    validarFormulario();
    return;
  }
  clubeSel.disabled = false;
  clubeSel.innerHTML = '<option value="">-- Selecione um clube --</option>';
  clubes[valor].forEach(clube => {
    const inscritos = contarInscricoes(clube);
    const cheio = inscritos >= LIMITE_POR_CLUBE;
    const opt = document.createElement('option');
    opt.value = clube;
    opt.textContent = cheio ? clube + ' ❌ (CHEIO)' : clube + ' (' + inscritos + '/' + LIMITE_POR_CLUBE + ')';
    if (cheio) opt.disabled = true;
    if (clube === clubeAtual) opt.selected = true;
    clubeSel.appendChild(opt);
  });
  if (clubeAtual) atualizarVagasInfo();
  validarFormulario();
}
function atualizarVagasInfo() {
  const clube = clubeSel.value;
  if (!clube) { vagasInfo.classList.remove('show'); return; }
  const inscritos = contarInscricoes(clube);
  const vagas = LIMITE_POR_CLUBE - inscritos;
  if (vagas <= 0) {
    vagasInfo.textContent = '❌ Clube LOTADO. Escolha outro.';
    vagasInfo.classList.add('cheio');
  } else {
    vagasInfo.textContent = '✅ Restam ' + vagas + ' vagas (' + inscritos + '/' + LIMITE_POR_CLUBE + ')';
    vagasInfo.classList.remove('cheio');
  }
  vagasInfo.classList.add('show');
}

nomeInput.addEventListener('input', validarFormulario);

btnWpp.addEventListener('click', () => {
  const nome = nomeInput.value.trim();
  const ligaTexto = ligaSel.options[ligaSel.selectedIndex].text;
  const clubeTexto = clubeSel.value;
  if (!db) { alert('❌ Sem conexão.'); return; }
  if (clubeCheio(clubeTexto)) {
    resultado.innerHTML = '❌ <strong>Clube LOTADO!</strong>';
    resultado.classList.add('erro'); resultado.classList.add('show');
    return;
  }
  btnWpp.disabled = true;
  btnWpp.textContent = '⏳ Salvando...';
  inscricoesRef.push({
    nome: nome, liga: ligaTexto, clube: clubeTexto,
    data: new Date().toLocaleString('pt-BR'),
    timestamp: Date.now()
  }).then(() => {
    const inscritos = contarInscricoes(clubeTexto) + 1;
    const mensagem = '*🆕 Nova inscrição - Copa eFootball!*%0A%0A' +
      '👤 *Nome:* ' + nome + '%0A' +
      '🏆 *Liga:* ' + ligaTexto + '%0A' +
      '⚽ *Clube:* ' + clubeTexto + '%0A' +
      '📊 *Vaga:* ' + inscritos + '/' + LIMITE_POR_CLUBE;
    window.open('https://wa.me/' + SEU_WHATSAPP + '?text=' + mensagem, '_blank');
    resultado.classList.remove('erro');
    resultado.innerHTML = '✅ <strong>Inscrição enviada!</strong><br><br>' +
      '👤 Nome: <strong>' + nome + '</strong><br>' +
      '🏆 Liga: <strong>' + ligaTexto + '</strong><br>' +
      '⚽ Clube: <strong>' + clubeTexto + '</strong><br>' +
      '📊 Vaga: <strong>' + inscritos + '/' + LIMITE_POR_CLUBE + '</strong><br><br>' +
      '📱 <em>Confirme no WhatsApp.</em>';
    resultado.classList.add('show');
    nomeInput.value = '';
    btnWpp.textContent = '📱 Enviar inscrição pelo WhatsApp';
    validarFormulario();
  }).catch((e) => {
    resultado.innerHTML = '❌ Erro: ' + e.message;
    resultado.classList.add('erro'); resultado.classList.add('show');
    btnWpp.textContent = '📱 Enviar inscrição pelo WhatsApp';
    validarFormulario();
  });
});
